<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ECHO ORBIT — The Book of Light</title>
<style>
  :root {
    --bg: #070a18; --panel: #0b1026; --text: #d9e1ff; --dim: #8e9bff;
    --gold: #ffd166; --mint: #5df2c8; --coral: #ff7e6b; --violet: #b388ff;
    --line: #232a4d;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: radial-gradient(120% 90% at 50% 0%, #101736 0%, var(--bg) 60%);
    color: var(--text); font: 16px/1.65 Georgia, 'Times New Roman', serif;
  }
  main { max-width: 780px; margin: 0 auto; padding: 28px 20px 80px; }
  h1, h2, h3 { font-family: Verdana, Geneva, sans-serif; letter-spacing: 2px; line-height: 1.25; }
  h1 { color: var(--gold); font-size: 26px; text-align: center; margin: 26px 0 4px; }
  h2 { color: var(--violet); font-size: 19px; margin: 44px 0 12px; border-bottom: 1px solid var(--line); padding-bottom: 8px; }
  h3 { color: var(--mint); font-size: 15px; margin: 30px 0 8px; }
  p { margin: 12px 0; }
  strong { color: #fff; }
  em { color: var(--dim); }
  code { font-family: Consolas, monospace; font-size: 14px; background: #141b3a; padding: 1px 6px; border-radius: 6px; color: var(--gold); }
  pre { background: #0d132e; border: 1px solid var(--line); border-radius: 12px; padding: 12px 16px; overflow-x: auto; }
  pre code { background: none; padding: 0; }
  blockquote { margin: 16px 0; padding: 10px 18px; border-left: 3px solid var(--gold); background: #10142e; color: #fff3c4; font-style: italic; border-radius: 0 10px 10px 0; }
  hr { border: none; border-top: 1px solid var(--line); margin: 40px 0; }
  table { border-collapse: collapse; width: 100%; margin: 14px 0; font-family: Verdana, sans-serif; font-size: 12.5px; }
  th, td { border: 1px solid var(--line); padding: 7px 10px; text-align: left; vertical-align: top; }
  th { color: var(--gold); background: #10142e; letter-spacing: 1px; }
  tr:nth-child(even) td { background: #0c1129; }
  ul, ol { padding-left: 24px; }
  li { margin: 6px 0; }
  .subtitle { text-align: center; color: var(--dim); font-style: italic; margin-bottom: 30px; }
  .top { text-align: center; margin: 40px 0 0; }
  .top a { color: var(--dim); font-family: Verdana, sans-serif; font-size: 12px; letter-spacing: 2px; text-decoration: none; }
  #err { color: var(--coral); text-align: center; font-family: Verdana, sans-serif; }
</style>
</head>
<body>
<main>
  <div id="content"><p id="err"></p></div>
  <div class="top"><a href="#">▲ BACK TO ORBIT</a> &nbsp;·&nbsp; <a href="/play/">PLAY ECHO ORBIT</a></div>
</main>
<script>
// Minimal markdown renderer — just enough for the Pilot's Guide.
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function inline(s){
  return s
    .replace(/`([^`]+)`/g, (_,c)=>'<code>'+c+'</code>')
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/\*([^*]+)\*/g, '<em>$1</em>');
}
function render(md){
  const lines = md.split(/\r?\n/);
  let html = '', i = 0, para = [], list = [];
  const flushP = ()=>{ if(para.length){ html += '<p>'+inline(esc(para.join(' ')))+'</p>'; para=[]; } };
  const flushL = ()=>{ if(list.length){ html += '<ul>'+list.map(x=>'<li>'+inline(esc(x))+'</li>').join('')+'</ul>'; list=[]; } };
  while(i < lines.length){
    const l = lines[i];
    if(/^```/.test(l)){ flushP(); flushL(); let code=[]; i++;
      while(i<lines.length && !/^```/.test(lines[i])){ code.push(lines[i]); i++; }
      html += '<pre><code>'+esc(code.join('\n'))+'</code></pre>'; i++; continue; }
    if(/^\|/.test(l)){ flushP(); flushL(); let rows=[];
      while(i<lines.length && /^\|/.test(lines[i])){ rows.push(lines[i]); i++; }
      html += '<table>';
      rows.forEach((r,ri)=>{
        if(/^\|[\s\-|]+\|$/.test(r)) return; // separator row
        const cells = r.slice(1,-1).split('|').map(c=>inline(esc(c.trim())));
        const tag = ri===0 ? 'th' : 'td';
        html += '<tr>'+cells.map(c=>'<'+tag+'>'+c+'</'+tag+'>').join('')+'</tr>';
      });
      html += '</table>'; continue; }
    if(/^### /.test(l)){ flushP(); flushL(); html+='<h3>'+inline(esc(l.slice(4)))+'</h3>'; }
    else if(/^## /.test(l)){ flushP(); flushL(); html+='<h2>'+inline(esc(l.slice(3)))+'</h2>'; }
    else if(/^# /.test(l)){ flushP(); flushL(); html+='<h1>'+inline(esc(l.slice(2)))+'</h1>'; }
    else if(/^> /.test(l)){ flushP(); flushL(); html+='<blockquote>'+inline(esc(l.slice(2)))+'</blockquote>'; }
    else if(/^---\s*$/.test(l)){ flushP(); flushL(); html+='<hr>'; }
    else if(/^- /.test(l)){ flushP(); let item=l.slice(2);
      while(i+1<lines.length && /^  \S/.test(lines[i+1]) && !/^- /.test(lines[i+1])){ item+=' '+lines[i+1].trim(); i++; }
      list.push(item); }
    else if(/^\s*$/.test(l)){ flushP(); flushL(); }
    else { flushL(); para.push(l.trim()); }
    i++;
  }
  flushP(); flushL();
  return html;
}
fetch('PILOT-GUIDE.md').then(r=>{ if(!r.ok) throw 0; return r.text(); })
  .then(md=>{ document.getElementById('content').innerHTML = render(md); document.title='ECHO ORBIT — The Book of Light'; })
  .catch(()=>{ document.getElementById('err').textContent='Could not load the guide — try refreshing.'; });
</script>
</body>
</html>
