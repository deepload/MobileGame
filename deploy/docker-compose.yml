# Server-side compose (lives at /opt/echo-orbit on the VPS).
# The backend is NOT exposed on the host — nginx proxies to it on the
# docker network, so it cannot clash with other services (e.g. ipfs on 8080).
services:
  backend:
    build: ./server
    container_name: echo-orbit-backend
    volumes:
      - ./server/data:/app/data # leaderboards & saves survive restarts
    restart: unless-stopped

  web:
    image: nginx:alpine
    container_name: echo-orbit-web
    ports:
      - "80:80"
    volumes:
      - ./web:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: unless-stopped
